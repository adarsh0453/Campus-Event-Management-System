<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Campus Event Management System</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">
                <span class="logo-icon">📅</span> Campus Events
            </a>
            <div class="navbar-menu" id="navbarMenu">
                <a href="events.html" class="nav-link">Browse Events</a>
                <a href="login.html" class="nav-link">Login</a>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="auth-main">
        <div class="auth-container">
            <div class="auth-form-wrapper">
                <h1>Create Account</h1>
                <p class="auth-subtitle">Join our campus community</p>

                <form id="registerForm" class="auth-form">
                    <div class="form-group">
                        <label for="name">Full Name</label>
                        <input 
                            type="text" 
                            id="name" 
                            name="name" 
                            placeholder="Your Name"
                            autocomplete="name"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="email">Email Address</label>
                        <input 
                            type="email" 
                            id="email" 
                            name="email" 
                            placeholder="you@example.com"
                            autocomplete="email"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="password">Password</label>
                        <input 
                            type="password" 
                            id="password" 
                            name="password" 
                            placeholder="••••••••"
                            autocomplete="new-password"
                            required
                        >
                    </div>

                    <div class="form-group">
                        <label for="role">Role</label>
                        <select id="role" name="role" required>
                            <option value="">Select your role</option>
                            <option value="student">Student</option>
                            <option value="organizer">Event Organizer</option>
                            <option value="admin">Admin</option>
                        </select>
                    </div>

                    <div id="errorMessage" class="error-message"></div>

                    <button type="submit" class="auth-button">Create Account</button>
                </form>

                <div class="auth-footer">
                    <p>Already have an account? <a href="login.html">Sign in here</a></p>
                </div>
            </div>
        </div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setupHamburger();
            setupRegisterForm();

            // Redirect if already logged in
            if (getCurrentUser()) {
                window.location.href = 'dashboard.html';
            }
        });

        function setupRegisterForm() {
            const form = document.getElementById('registerForm');
            const errorDiv = document.getElementById('errorMessage');

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                errorDiv.textContent = '';

                const name = document.getElementById('name').value.trim();
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                const role = document.getElementById('role').value;

                // Validation
                if (!name || !email || !password || !role) {
                    errorDiv.textContent = 'Please fill in all fields';
                    return;
                }

                if (password.length < 6) {
                    errorDiv.textContent = 'Password must be at least 6 characters';
                    return;
                }

                if (!email.includes('@')) {
                    errorDiv.textContent = 'Please enter a valid email';
                    return;
                }

                const result = await registerUser(name, email, password, role);

                if (result.success) {
                    errorDiv.style.color = '#4caf50';
                    errorDiv.textContent = 'Account created successfully! Redirecting to login...';
                    
                    setTimeout(() => {
                        window.location.href = 'login.html';
                    }, 1500);
                } else {
                    errorDiv.textContent = result.message;
                }
            });
        }

        function setupHamburger() {
            const hamburger = document.getElementById('hamburger');
            const navbarMenu = document.getElementById('navbarMenu');

            hamburger.addEventListener('click', () => {
                navbarMenu.classList.toggle('active');
                hamburger.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.navbar')) {
                    navbarMenu.classList.remove('active');
                    hamburger.classList.remove('active');
                }
            });
        }
    </script>
</body>
</html>
