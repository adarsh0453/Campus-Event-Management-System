<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Events - Campus Event Management System</title>
    <link rel="stylesheet" href="css/main.css">
</head>
<body>
    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="navbar-container">
            <a href="index.html" class="navbar-logo">
                <span class="logo-icon">📅</span> Campus Events
            </a>
            <div class="navbar-menu" id="navbarMenu">
                <a href="events.html" class="nav-link active">Browse Events</a>
                <div id="auth-nav"></div>
                <a href="#" onclick="toggleDarkMode(event)" class="nav-link dark-mode-toggle">🌙</a>
            </div>
            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Loader -->
    <div class="loader-container" id="loaderContainer">
        <div class="brand-loader" aria-hidden="true">
            <div class="logo-ring" aria-hidden="true">
                <div class="loader-core"><div class="ring-anim" aria-hidden="true"></div></div>
            </div>
            <div class="brand-text" aria-hidden="true">
                <span>C</span><span>A</span><span>M</span><span>P</span><span>U</span><span>S</span>
                <span class="space"></span>
                <span>E</span><span>V</span><span>E</span><span>N</span><span>T</span><span>S</span>
            </div>
        </div>
    </div>

    <!-- Main Content -->
    <main class="main-content" id="mainContent" style="display: none;">
        <div class="container">
            <div class="events-header">
                <h1>Campus Events</h1>
                <p>Discover and register for upcoming events</p>
            </div>

            <!-- Filters and Search -->
            <div class="filters-section">
                <div class="search-box">
                    <input 
                        type="text" 
                        id="searchInput" 
                        placeholder="Search events by name..."
                        class="search-input"
                    >
                </div>

                <div class="filter-controls">
                    <select id="categoryFilter" class="filter-select">
                        <option value="">All Categories</option>
                        <option value="Academic">Academic</option>
                        <option value="Sports">Sports</option>
                        <option value="Cultural">Cultural</option>
                        <option value="Social">Social</option>
                        <option value="Workshop">Workshop</option>
                    </select>

                    <select id="sortSelect" class="filter-select">
                        <option value="upcoming">Upcoming First</option>
                        <option value="oldest">Oldest First</option>
                        <option value="alphabetical">Alphabetical</option>
                    </select>
                </div>
            </div>

            <!-- Events Grid -->
            <div class="events-grid" id="eventsGrid">
                <div class="skeleton-loader"></div>
                <div class="skeleton-loader"></div>
                <div class="skeleton-loader"></div>
                <div class="skeleton-loader"></div>
            </div>

            <!-- Empty State -->
            <div id="emptyState" class="empty-state" style="display: none;">
                <div class="empty-icon">📭</div>
                <h2>No Events Found</h2>
                <p>Try adjusting your search or filters to find events</p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="footer">
            <div class="container">
                <p>&copy; 2026 Campus Event Management System. All rights reserved.</p>
            </div>
        </footer>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/events.js"></script>
    <script>
        let allEvents = [];
        let filteredEvents = [];

        document.addEventListener('DOMContentLoaded', () => {
            renderNavbar();
            setupHamburger();
            checkAuthForRestrictedPage();
            initializeEventsPage();
            setupEventListeners();
        });

        function initializeEventsPage() {
            const loaderContainer = document.getElementById('loaderContainer');
            const mainContent = document.getElementById('mainContent');

            // Simulate loading delay and use unified finishLoading
            setTimeout(() => {
                finishLoading('mainContent', 1200, async () => {
                    await loadAllEvents();
                });
            }, 800);
        }

        async function loadAllEvents() {
            allEvents = await getAllEvents();
            filteredEvents = [...allEvents];
            renderEvents();
        }

        function renderEvents() {
            const grid = document.getElementById('eventsGrid');
            const emptyState = document.getElementById('emptyState');

            if (filteredEvents.length === 0) {
                grid.style.display = 'none';
                emptyState.style.display = 'flex';
                return;
            }

            grid.style.display = 'grid';
            emptyState.style.display = 'none';
            
            grid.innerHTML = '';
            
            filteredEvents.forEach(event => {
                const card = createEventCardWithActions(event);
                grid.appendChild(card);
            });
        }

        function createEventCardWithActions(event) {
            const card = document.createElement('div');
            card.className = 'event-card';
            
            const seatsLeft = event.maxCapacity - event.attendees.length;
            const isAlmost = seatsLeft <= 2;
            const currentUser = getCurrentUser();
            const isAttending = currentUser && event.attendees.includes(currentUser.id);
            const isFull = seatsLeft <= 0;

            let actionBtn = '';
            if (currentUser && currentUser.role === 'student') {
                if (isAttending) {
                    actionBtn = `<button class="unregister-btn" onclick="handleUnregister('${event.id}')">Unregister</button>`;
                } else if (isFull) {
                    actionBtn = `<button class="register-btn" disabled>Event Full</button>`;
                } else {
                    actionBtn = `<button class="register-btn" onclick="handleRegister('${event.id}')">Register</button>`;
                }
            }

            card.innerHTML = `
                <div class="event-card-header">
                    <h3>${event.name}</h3>
                    <span class="category-badge">${event.category}</span>
                </div>
                <p class="event-date">📅 ${formatDate(event.date)}</p>
                <p class="event-venue">📍 ${event.venue}</p>
                <p class="event-description">${event.description.substring(0, 80)}...</p>
                <div class="event-stats">
                    <span class="attendance">👥 ${event.attendees.length} attending</span>
                    <span class="seats-info ${isAlmost ? 'almost-full' : ''} ${isFull ? 'full' : ''}">
                        ${isFull ? 'Full' : seatsLeft + ' seats left'}
                    </span>
                </div>
                <div class="event-footer">
                    ${actionBtn}
                    <a href="event-details.html?id=${event.id}" class="view-btn">Details</a>
                </div>
            `;
            return card;
        }

        function setupEventListeners() {
            const searchInput = document.getElementById('searchInput');
            const categoryFilter = document.getElementById('categoryFilter');
            const sortSelect = document.getElementById('sortSelect');

            searchInput.addEventListener('input', applyFilters);
            categoryFilter.addEventListener('change', applyFilters);
            sortSelect.addEventListener('change', applyFilters);
        }

        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const category = document.getElementById('categoryFilter').value;
            const sort = document.getElementById('sortSelect').value;

            filteredEvents = allEvents.filter(event => {
                const matchesSearch = event.name.toLowerCase().includes(search) || 
                                     event.description.toLowerCase().includes(search);
                const matchesCategory = !category || event.category === category;
                
                return matchesSearch && matchesCategory;
            });

            // Apply sorting
            if (sort === 'upcoming') {
                filteredEvents.sort((a, b) => new Date(a.date) - new Date(b.date));
            } else if (sort === 'oldest') {
                filteredEvents.sort((a, b) => new Date(b.date) - new Date(a.date));
            } else if (sort === 'alphabetical') {
                filteredEvents.sort((a, b) => a.name.localeCompare(b.name));
            }

            renderEvents();
        }

        async function handleRegister(eventId) {
            const currentUser = getCurrentUser();
            if (!currentUser) {
                window.location.href = 'login.html';
                return;
            }

            const result = await registerUserForEvent(currentUser.id, eventId);
            if (result.success) {
                await loadAllEvents();
                showNotification('Successfully registered for event!', 'success');
            } else {
                showNotification(result.message, 'error');
            }
        }

        async function handleUnregister(eventId) {
            const currentUser = getCurrentUser();
            if (!currentUser) return;

            const result = await unregisterUserFromEvent(currentUser.id, eventId);
            if (result.success) {
                await loadAllEvents();
                showNotification('Successfully unregistered from event', 'success');
            } else {
                showNotification(result.message, 'error');
            }
        }

        function setupHamburger() {
            const hamburger = document.getElementById('hamburger');
            const navbarMenu = document.getElementById('navbarMenu');

            hamburger.addEventListener('click', () => {
                navbarMenu.classList.toggle('active');
                hamburger.classList.toggle('active');
            });

            document.addEventListener('click', (e) => {
                if (!e.target.closest('.navbar')) {
                    navbarMenu.classList.remove('active');
                    hamburger.classList.remove('active');
                }
            });
        }

        function renderNavbar() {
            const authNav = document.getElementById('auth-nav');
            const currentUser = getCurrentUser();

            if (currentUser) {
                authNav.innerHTML = `
                    <a href="dashboard.html" class="nav-link">Dashboard</a>
                    <a href="my-events.html" class="nav-link">My Events</a>
                    <button class="nav-link logout-btn" onclick="logoutUser()">Logout</button>
                `;
            } else {
                authNav.innerHTML = `
                    <a href="login.html" class="nav-link">Login</a>
                    <a href="register.html" class="nav-link register-link">Register</a>
                `;
            }
        }

        function checkAuthForRestrictedPage() {
            // This page is accessible to all
        }

        function showNotification(message, type) {
            // Create notification element
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);

            setTimeout(() => {
                notification.classList.add('show');
            }, 10);

            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }
    </script>
</body>
</html>
